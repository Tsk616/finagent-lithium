services:
  - type: web
    name: finagent-lithium
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web.app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_TIMEOUT_SECONDS
        value: "12"
      - key: WIND_API_KEY
        sync: false
      - key: WIND_SKILL_DIR
        value: .agents/skills/wind-mcp-skill
      - key: WIND_ENABLE_LIVE
        value: "1"
      - key: WIND_DAILY_POINT_LIMIT
        value: "500"
      - key: WIND_CALL_POINT_COST
        value: "1"
      - key: WIND_FINANCIAL_TIMEOUT_SECONDS
        value: "12"
      - key: WIND_ENABLE_CONTEXT
        value: "1"
      - key: WIND_CONTEXT_TIMEOUT_SECONDS
        value: "6"
      - key: WIND_PEER_MAX
        value: "2"
      - key: WIND_PEER_CODES
        value: "300750.SZ,002594.SZ,300014.SZ,688005.SH,002466.SZ"
      - key: MX_APIKEY
        sync: false
    plan: free
