<!-- Core ratio cards partial (Phase 2): 6 key financial ratios at a glance -->
{% if core_ratios %}
<section class="ratio-cards-section">
  <h2 class="chapter-title">🎯 核心比率速览</h2>
  <div class="ratio-grid">
    {% for r in core_ratios %}
    <div class="ratio-card risk-{{ r.risk_color }}">
      <div class="ratio-header">
        <span class="ratio-icon">{{ r.icon }}</span>
        <span class="ratio-name">{{ r.name }}</span>
      </div>
      <div class="ratio-value">
        {% if r.value is not none %}
          {{ r.value }}
        {% else %}
          <span class="muted">—</span>
        {% endif %}
      </div>
      <div class="ratio-risk">{{ r.risk_level }}</div>
      {% if r.normal_range %}
      <div class="ratio-range">正常: {{ r.normal_range }}</div>
      {% endif %}
      {% if r.sparkline %}
      <div class="ratio-sparkline" data-labels='{{ r.sparkline.labels | tojson }}' data-values='{{ r.sparkline.values | tojson }}'></div>
      {% endif %}
    </div>
    {% endfor %}
  </div>
</section>
{% endif %}
